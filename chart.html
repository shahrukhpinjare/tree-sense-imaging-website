<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Historical Charts</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f7f6;
      }

      header {
        background: linear-gradient(90deg, #14532d, #22c55e);
        color: white;
        padding: 20px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .toggle-buttons {
        margin-top: 10px;
      }

      .toggle-buttons button {
        background: #16a34a;
        color: white;
        border: none;
        padding: 12px 25px;
        margin: 8px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      .toggle-buttons button:hover {
        background: #15803d;
        transform: translateY(-3px);
      }

      .iframe-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80vh;
      }

      iframe {
        width: 95%;
        height: 90%;
        border: none;
        border-radius: 15px;
        background: white;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Historical Data</h1>
      <div class="toggle-buttons">
        <button id="rainfall-button">Rainfall</button>
        <button id="temperature-button">Temperature</button>
        <button id="aqi-button">AQI</button>
        <button id="soil-button">Soil pH</button>
      </div>
    </header>
    <div class="iframe-container">
      <iframe id="model-iframe" src="rainfall.html"></iframe>
    </div>
    <script>
      const rainfallButton = document.getElementById("rainfall-button");
      const temperatureButton = document.getElementById("temperature-button");
      const aqiButton = document.getElementById("aqi-button");
      const soilButton = document.getElementById("soil-button");
      const modelIframe = document.getElementById("model-iframe");

      rainfallButton.addEventListener("click", () => {
        modelIframe.src = "rainfall.html";
      });

      temperatureButton.addEventListener("click", () => {
        modelIframe.src = "temperature.html";
      });

      aqiButton.addEventListener("click", () => {
        modelIframe.src = "aqi.html";
      });

      soilButton.addEventListener("click", () => {
        modelIframe.src = "soil.html";
      });
    </script>
  </body>
</html>
