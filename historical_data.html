<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #dff6e4, #f8fffa);
        padding: 20px;
        margin: 0;
      }

      h1,
      h2 {
        color: #006400; /* Dark Green */
      }

      form {
        max-width: 700px;
        margin: 30px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      input[type="text"] {
        width: 72%;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      button {
        padding: 14px 24px;
        background: linear-gradient(90deg, #15803d, #22c55e);
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(34, 197, 94, 0.35);
      }

      #weather {
        margin: 30px auto;
        max-width: 900px;
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      canvas {
        background: white;
        border-radius: 15px;
        padding: 15px;
      }

      /* Responsive styles */
      @media (max-width: 600px) {
        input[type="text"] {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center; color: #14532d; font-size: 42px">
      Weather Data
    </h1>
    <p style="text-align: center; color: #555">
      Monitor current weather and visualize historical weather trends.
    </p>
    <form id="location-form">
      <input type="text" id="location" placeholder="Enter Location" />
      <button type="button" id="get-weather">Get Weather</button>
    </form>
    <div id="weather" style="display: none">
      <h2>Current Weather</h2>
      <div id="current-weather"></div>
      <h2>Historical Weather</h2>
      <canvas id="historical-chart"></canvas>
    </div>
    <script src="/src/assets/js/app.js"></script>
  </body>
</html>
