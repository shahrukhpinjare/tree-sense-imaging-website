<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #dff6e4, #ffffff);
      }

      h2,
      h3 {
        color: #333;
        padding: 20px;
      }

      h3 {
        display: flex;
        align-items: center;
      }

      input[type="file"] {
        display: block;
        margin: 20px;
      }

      button {
        background: linear-gradient(90deg, #15803d, #22c55e);
        color: white;
        padding: 15px 35px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(34, 197, 94, 0.4);
      }

      .image-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
        margin-top: 30px;
      }

      .image-container img {
        max-width: 420px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      #green-cover-percentage {
        font-size: 24px;
      }
      #idle-land-percentage {
        font-size: 24px;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin: 40px 0;
        flex-wrap: wrap;
      }

      .card {
        background: white;
        padding: 25px;
        width: 260px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .card h2 {
        font-size: 42px;
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <center>
      <h2>Green Cover Estimator</h2>
      <p style="color: #555">
        Analyze satellite or drone images to estimate green cover using
        Artificial Intelligence.
      </p>

      <input type="file" id="image-file" accept="image/*" />

      <br /><br />

      <button onclick="processImage()">🚀 Analyze Image</button>
    </center>
    <h3>Processed Image:</h3>
    <div class="image-container">
      <img id="uploaded-image" src="" alt="Uploaded Image" />
      <img id="processed-image" src="" alt="Processed Image" />
    </div>

    <div class="stats">
      <div class="card">
        Green Cover Percentage:

        <h2 id="green-cover-percentage">0%</h2>
      </div>

      <div class="card">
        Idle Land Percentage:

        <h2 id="idle-land-percentage">0%</h2>
        <p id="idle-land-percentage"></p>
      </div>
    </div>

    <script>
      function processImage() {
        const fileInput = document.getElementById("image-file");
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onloadend = () => {
          const uploadedImage = document.getElementById("uploaded-image");
          const processedImage = document.getElementById("processed-image");
          const greenCoverPercentage = document.getElementById(
            "green-cover-percentage",
          );
          const idleLandPercentage = document.getElementById(
            "idle-land-percentage",
          );

          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let blackPixelCount = 0;

            // Calculate the mean green value
            let totalGreen = 0;
            for (let i = 1; i < imageData.data.length; i += 4) {
              totalGreen += imageData.data[i];
            }
            const meanGreen = totalGreen / (imageData.data.length / 4);

            for (let i = 0; i < imageData.data.length; i += 4) {
              let gray = imageData.data[i + 1] * 0.587; // Keep only green channel

              if (gray < meanGreen / 1.5) {
                gray = 0;
                blackPixelCount++;
              } else {
                gray = 255;
              }

              imageData.data[i] = gray; // Red channel
              imageData.data[i + 1] = gray; // Green channel
              imageData.data[i + 2] = gray; // Blue channel
              imageData.data[i + 3] = 255; // Alpha channel
            }

            ctx.putImageData(imageData, 0, 0);

            // Display the processed image and green cover percentage
            processedImage.src = canvas.toDataURL();
            greenCoverPercentage.textContent =
              (
                (blackPixelCount / (canvas.width * canvas.height)) *
                100
              ).toFixed(2) + "%";
            idleLandPercentage.textContent =
              (
                100 -
                (blackPixelCount / (canvas.width * canvas.height)) * 100
              ).toFixed(2) + "%";
          };
          img.src = reader.result;

          // Display the uploaded image
          uploadedImage.src = reader.result;
        };

        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
